<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080,height=1080">
<title>Concept G — DISTRIBUTE. (Carousel Slide 4) — 1080×1080</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1080px;overflow:hidden;font-family:'Poppins',sans-serif;background:#0D1117;position:relative}
body::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(59,130,246,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
.canvas{width:1080px;height:1080px;position:relative;overflow:hidden}

.logo{position:absolute;left:36px;top:32px;z-index:10}
.logo img{height:48px;width:auto}
.sub-badge{position:absolute;right:36px;top:36px;z-index:10;font-size:15px;font-weight:500;color:rgba(255,255,255,0.7);background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);padding:6px 16px;border-radius:20px;white-space:nowrap}

.hero-glow{position:absolute;right:80px;top:200px;width:400px;height:400px;background:#20C997;border-radius:50%;filter:blur(80px);opacity:0.2;z-index:1}
.hero-img{position:absolute;right:-20px;top:20px;width:600px;height:820px;z-index:2}
.hero-img img{width:100%;height:100%;object-fit:contain;object-position:bottom right;mask-image:radial-gradient(ellipse 70% 65% at center 40%,rgba(0,0,0,1) 30%,rgba(0,0,0,0) 100%);-webkit-mask-image:radial-gradient(ellipse 70% 65% at center 40%,rgba(0,0,0,1) 30%,rgba(0,0,0,0) 100%)}

.person-name{position:absolute;left:40px;top:110px;z-index:5;font-size:20px;font-weight:700;color:#20C997;text-transform:uppercase;letter-spacing:2px}
.person-title{position:absolute;left:40px;top:135px;z-index:5;font-size:14px;font-weight:400;color:rgba(255,255,255,0.5)}
.module-pill{position:absolute;left:40px;top:180px;z-index:5;font-size:14px;font-weight:600;color:#20C997;background:rgba(32,201,151,0.12);border:1px solid rgba(32,201,151,0.3);padding:4px 14px;border-radius:20px}

.headline{position:absolute;left:40px;top:230px;z-index:5;font-size:140px;font-weight:900;color:#20C997;text-transform:uppercase;line-height:0.85;transform:scaleX(0.72);transform-origin:left}

.topic-tags{position:absolute;left:40px;top:470px;z-index:5;display:flex;flex-wrap:wrap;gap:8px;max-width:480px}
.topic-tag{font-size:15px;font-weight:500;color:rgba(255,255,255,0.6);background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:6px;padding:6px 14px}

.cta-btn{position:absolute;left:40px;bottom:100px;z-index:5;background:#20C997;color:#0D1117;font-family:'Poppins',sans-serif;font-size:22px;font-weight:700;padding:14px 36px;border-radius:8px;border:none;text-transform:uppercase;cursor:pointer;white-space:nowrap}
.sw-badge{position:absolute;left:270px;bottom:106px;z-index:5;font-size:14px;font-weight:600;color:rgba(255,255,255,0.75);background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);padding:6px 16px;border-radius:20px;white-space:nowrap}

.carousel-dots{position:absolute;left:50%;bottom:32px;transform:translateX(-50%);z-index:5;display:flex;gap:8px;align-items:center}
.dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,0.2)}
.dot.active{width:28px;border-radius:5px;background:#20C997}

[data-sigma]{cursor:move;position:absolute}
</style>
</head>
<body>

  <div class="cta-btn" data-sigma style="left:40px;bottom:100px;top:auto">

  <div class="carousel-dots" data-sigma style="left:490px;bottom:32px;top:auto">

<script src="_interactive.js"></script>

</html>
