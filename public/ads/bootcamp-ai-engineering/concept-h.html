<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080,height=1080">
<title>Concept H — 500 ENGINEERS. ONE ROOM. — 1080×1080</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1080px;overflow:hidden;font-family:'Poppins',sans-serif;background:#0D1117;position:relative}
body::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(59,130,246,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
.canvas{width:1080px;height:1080px;position:relative;overflow:hidden}

.logo{position:absolute;left:36px;top:32px;z-index:10}
.logo img{height:48px;width:auto}
.sub-badge{position:absolute;right:36px;top:36px;z-index:10;font-size:15px;font-weight:500;color:rgba(255,255,255,0.7);background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);padding:6px 16px;border-radius:20px;white-space:nowrap}

.hero-glow{position:absolute;right:80px;top:250px;width:350px;height:350px;background:#3b82f6;border-radius:50%;filter:blur(80px);opacity:0.35;z-index:1}
.hero-img{position:absolute;right:-30px;top:60px;width:620px;height:800px;z-index:2}
.hero-img img{width:100%;height:100%;object-fit:contain;object-position:bottom right;mask-image:radial-gradient(ellipse 70% 65% at center 40%,rgba(0,0,0,1) 30%,rgba(0,0,0,0) 100%);-webkit-mask-image:radial-gradient(ellipse 70% 65% at center 40%,rgba(0,0,0,1) 30%,rgba(0,0,0,0) 100%)}

.headline{position:absolute;left:40px;top:180px;z-index:5;font-size:120px;font-weight:900;text-transform:uppercase;letter-spacing:-1px;line-height:0.92;transform:scaleX(0.74);transform-origin:left;color:#fff;max-width:520px}
.headline .blue{color:#3b82f6}

.quote{position:absolute;left:40px;top:560px;z-index:5;max-width:420px;font-size:17px;font-style:italic;color:rgba(255,255,255,0.5);border-left:3px solid rgba(59,130,246,0.4);padding-left:16px;line-height:1.6}

.cta-btn{position:absolute;left:40px;bottom:100px;z-index:5;background:#3b82f6;color:#fff;font-family:'Poppins',sans-serif;font-size:22px;font-weight:700;padding:14px 36px;border-radius:8px;border:none;text-transform:uppercase;cursor:pointer;white-space:nowrap}
.sw-badge{position:absolute;left:370px;bottom:106px;z-index:5;font-size:14px;font-weight:600;color:rgba(255,255,255,0.75);background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);padding:6px 16px;border-radius:20px;white-space:nowrap}

.stats-bar{position:absolute;left:0;bottom:0;width:1080px;height:52px;z-index:8;background:rgba(13,17,23,0.95);border-top:1px solid rgba(59,130,246,0.2);display:flex;align-items:center;justify-content:center;gap:0}
.stat-block{display:flex;flex-direction:column;align-items:center;padding:0 36px}
.stat-num{font-size:18px;font-weight:700;color:#3b82f6}
.stat-label{font-size:11px;font-weight:500;color:rgba(255,255,255,0.5);text-transform:uppercase}
.stat-divider{width:1px;height:28px;background:rgba(255,255,255,0.12)}

[data-sigma]{cursor:move;position:absolute}
</style>
</head>
<body>
<div class="canvas">
  <div class="logo" data-sigma style="left:36px;top:32px">
    <img src="/logos/codebasics-white.svg" alt="Codebasics" height="48">
  </div>

  <div class="sub-badge" data-sigma style="right:36px;top:36px;left:auto">
    1.4M+ Subscribers · 4.9★
  </div>

  <div class="hero-glow" data-sigma style="right:80px;top:250px;left:auto"></div>

  <div class="hero-img" data-sigma style="right:-30px;top:60px;left:auto">
    <img src="/images/bootcamps/ai-engineering/heroes/dhaval-superhero.png" alt="Dhaval">
  </div>

  <div class="headline" data-sigma style="left:40px;top:180px">
    500<br>ENGINEERS.<br><span class="blue">ONE<br>ROOM.</span>
  </div>

  <div class="quote" data-sigma style="left:40px;top:560px">
    "Not a lecture hall. A room where every question gets answered."
  </div>

  <div class="cta-btn" data-sigma style="left:40px;bottom:100px;top:auto">
    Join the Inner Circle →
  </div>

  <div class="sw-badge" data-sigma style="left:370px;bottom:106px;top:auto">
    ⚡ Built exclusively for Software Engineers (2+ yrs)
  </div>

  <div class="stats-bar" data-sigma style="left:0;bottom:0;top:auto">
    <div class="stat-block"><span class="stat-num">Live</span><span class="stat-label">Sessions</span></div>
    <div class="stat-divider"></div>
    <div class="stat-block"><span class="stat-num">4 hrs</span><span class="stat-label">Per Session</span></div>
    <div class="stat-divider"></div>
    <div class="stat-block"><span class="stat-num">1 hr</span><span class="stat-label">Doubt Clearing</span></div>
    <div class="stat-divider"></div>
    <div class="stat-block"><span class="stat-num">March 7</span><span class="stat-label">Batch Start</span></div>
  </div>
</div>
<script src="_interactive.js"></script>
</body>
</html>
